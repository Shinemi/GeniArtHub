<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://necolas.github.io/normalize.css/8.0.1/normalize.css">
    <link rel="stylesheet" href="css/style.css">
    <title>GeniArtHub - Où la créativité rencontre l'intelligence artificielle</title>
</head>
<body>
    <header>
        <div class="row">
            <a href="index.html">
                <img src="img/logo-white.png" alt="Logo du site GeniArtHub">
            </a>
        </div>
    </header>

    <main class="cartPage">
        <h1 id="h1Cart">Mon panier</h1>

        <div class="cartLayout">

            <div class="cartColumn">
                <section id="cart">
                    <h3 id="cartItem">Votre panier est vide.</h3>
                </section>

                <h3 id="cartTotalPrice">Total : 0.00€</h3>
            </div>

            <div class="cartFormColumn">
                <form class="cartForm" action="" method="post">
                    <h2>Livraison</h2>

                    <label for="firstname">Prénom :</label>
                    <input type="text" name="firstname" id="firstname">

                    <label for="lastname">Nom :</label>
                    <input type="text" name="lastname" id="lastname">

                    <label for="address">Adresse :</label>
                    <input type="text" name="address" id="address">

                    <label for="town">Ville :</label>
                    <input type="text" name="town" id="town">

                    <label for="email">Email :</label>
                    <input type="email" name="email" id="email">

                    <input type="submit" value="Passer commande" id="cartValidate">
                </form>
            </div>

        </div>
    </main>

    <footer>
        <p><a href="https://www.errantecreation.com/">Errante Creation</a> © 2023 - GeniArtHub</p>
    </footer>
    <script src="js/cart.js"></script>
</body>
</html>
